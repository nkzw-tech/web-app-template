allowBuilds:
  '@swc/core': true
catalog:
  vite: npm:@voidzero-dev/vite-plus-core@^0.1.21
  vite-plus: ^0.1.21
  vitest: npm:@voidzero-dev/vite-plus-test@^0.1.21
onlyBuiltDependencies:
  - '@swc/core'
  - '@tailwindcss/oxide'
  - unrs-resolver
overrides:
